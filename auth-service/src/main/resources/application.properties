spring.application.name=auth-service
server.port=${PORT:8081}

# Подключение к PostgreSQL через переменные окружения
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Настройки Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Логирование
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG
spring.datasource.hikari.maximum-pool-size=1
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=TRACE

# JWT токен
jwt.secret=9a4f2c8d3e1b7a6f5c4d3b2a1e0f9b8a7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f
jwt.expiration=3600000