spring.application.name=api-gateway
server.port=8080

# 🔴 Переменные для хостов по умолчанию (для запуска из IDEA)
AUTH_HOST=localhost
AUTH_PORT=8081

PRODUCT_HOST=localhost
PRODUCT_PORT=8083

# 🟢 Динамические маршруты
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://${AUTH_SERVICE_HOST:${AUTH_HOST}}:${AUTH_SERVICE_PORT:${AUTH_PORT}}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=http://${PRODUCT_SERVICE_HOST:${PRODUCT_HOST}}:${PRODUCT_SERVICE_PORT:${PRODUCT_PORT}}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/products/**

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=TRACE